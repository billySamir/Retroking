<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EstiloUrbano | Contacto</title>
    <!-- Rutas corregidas -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/contacto.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">👜 EstiloUrbano</a>
        
        <div class="buscador" style="visibility: hidden;">
            <input type="text" placeholder="Buscar...">
        </div>

        <div class="nav-iconos">
            <!-- Icono Modo Oscuro (Luna) -->
            <button class="btn-icono" onclick="toggleModoOscuro()" title="Cambiar Tema">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            
            <!-- Icono Mi Cuenta (Usuario) -->
            <button class="btn-icono" onclick="window.location.href='login.html'" title="Mi Cuenta">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
            
            <!-- Icono Carrito -->
            <button class="btn-icono" onclick="abrirCarrito()" title="Ver Carrito">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span id="contador-carrito">0</span>
            </button>
            
            <!-- Icono Menú (3 Líneas) -->
            <button class="btn-icono icono-menu" onclick="abrirMenu()" title="Abrir Menú">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
    </nav>

    <main class="contenedor-contacto">
        <div class="tarjeta-contacto">
            <div class="formulario-seccion">
                <h3>Envíanos un mensaje</h3>
                <form onsubmit="event.preventDefault(); mostrarToast('Mensaje enviado con éxito 🚀'); this.reset();">
                    <div class="grupo-input">
                        <label>Nombre</label>
                        <input type="text" required placeholder="Tu nombre">
                    </div>
                    <div class="grupo-input">
                        <label>Correo Electrónico</label>
                        <input type="email" required placeholder="tu@correo.com">
                    </div>
                    <div class="grupo-input">
                        <label>Mensaje</label>
                        <textarea rows="4" required placeholder="Escribe tu duda..."></textarea>
                    </div>
                    <button type="submit" class="btn-enviar">Enviar Mensaje</button>
                </form>
            </div>

            <div class="info-seccion">
                <h3>Información de la Tienda</h3>
                <p>📍 Av. Principal 123, Distrito Comercial, Lima, Perú</p>
                <p>📞 +51 987 654 321</p>
                <p>✉️ hola@estilourbano.com</p>
                
                <div class="redes-sociales">
                    <h4>Síguenos en redes</h4>
                    <a href="#" class="btn-instagram">📷 Instagram</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Paneles Ocultos -->
    <div class="overlay" id="overlay" onclick="cerrarPaneles()"></div>
    <div class="panel-lateral" id="panel-carrito">
        <div class="panel-cabecera"><h3>Tu Carrito</h3><button class="btn-cerrar" onclick="cerrarPaneles()">✖</button></div>
        <div class="panel-contenido" id="lista-carrito"></div>
        <div class="panel-footer"><h3>Total: S/ <span id="total-carrito">0.00</span></h3><button class="btn-principal" style="width: 100%; margin-top: 15px;" onclick="alert('¡Compra simulada!')">Pagar Ahora</button></div>
    </div>
    <div class="panel-lateral izquierdo" id="panel-menu">
        <div class="panel-cabecera"><h3>Menú</h3><button class="btn-cerrar" onclick="cerrarPaneles()">✖</button></div>
        <div class="panel-contenido enlaces-movil"><a href="index.html">Inicio</a><a href="tienda.html">Tienda</a><a href="contacto.html">Contacto</a></div>
    </div>

    <a href="https://wa.me/51987654321" target="_blank" class="btn-whatsapp">📱</a>

    <!-- Rutas corregidas -->
    <script src="../js/datos.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
