<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EstiloUrbano | Detalles</title>
    <!-- Rutas corregidas -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/producto.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">👜 EstiloUrbano</a>
        
        <div class="buscador" style="visibility: hidden;">
            <input type="text" placeholder="Buscar...">
        </div>

        <div class="nav-iconos">
            <!-- Icono Modo Oscuro (Luna) -->
            <button class="btn-icono" onclick="toggleModoOscuro()" title="Cambiar Tema">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            
            <!-- Icono Mi Cuenta (Usuario) -->
            <button class="btn-icono" onclick="window.location.href='login.html'" title="Mi Cuenta">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
            
            <!-- Icono Carrito -->
            <button class="btn-icono" onclick="abrirCarrito()" title="Ver Carrito">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span id="contador-carrito">0</span>
            </button>
            
            <!-- Icono Menú (3 Líneas) -->
            <button class="btn-icono icono-menu" onclick="abrirMenu()" title="Abrir Menú">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
    </nav>
    <main class="contenedor-producto">
        <!-- Botón para regresar -->
        <a href="tienda.html" class="btn-volver">← Volver al catálogo</a>

        <div class="vista-producto" id="detalle-contenedor">
            <h2 style='padding:50px;'>Cargando producto...</h2>
        </div>
    </main>

    <!-- Paneles Ocultos -->
    <div class="overlay" id="overlay" onclick="cerrarPaneles()"></div>
    <div class="panel-lateral" id="panel-carrito">
        <div class="panel-cabecera"><h3>Tu Carrito</h3><button class="btn-cerrar" onclick="cerrarPaneles()">✖</button></div>
        <div class="panel-contenido" id="lista-carrito"></div>
        <div class="panel-footer"><h3>Total: S/ <span id="total-carrito">0.00</span></h3><button class="btn-principal" style="width: 100%; margin-top: 15px;" onclick="alert('¡Compra simulada!')">Pagar Ahora</button></div>
    </div>
    <div class="panel-lateral izquierdo" id="panel-menu">
        <div class="panel-cabecera"><h3>Menú</h3><button class="btn-cerrar" onclick="cerrarPaneles()">✖</button></div>
        <div class="panel-contenido enlaces-movil"><a href="index.html">Inicio</a><a href="tienda.html">Tienda</a><a href="contacto.html">Contacto</a></div>
    </div>

    <a href="https://wa.me/51987654321" target="_blank" class="btn-whatsapp">📱</a>

    <!-- Rutas corregidas -->
    <script src="../js/datos.js"></script>
    <script src="../js/main.js"></script>
    <script>
        let productoActual;
        let tallaSeleccionada;
        let colorSeleccionado;

        window.onload = () => {
            const contador = document.getElementById('contador-carrito');
            if(contador) contador.innerText = carrito.length;

            const parametros = new URLSearchParams(window.location.search);
            const id = parseInt(parametros.get('id'));

            productoActual = productos.find(p => p.id === id);

            if(!productoActual) {
                document.getElementById('detalle-contenedor').innerHTML = "<h2 style='padding:50px;'>Producto no encontrado</h2>";
                return;
            }

            tallaSeleccionada = productoActual.tallas[0];
            colorSeleccionado = productoActual.colores[0];

            renderizarVista();
        };

        function renderizarVista() {
            const contenedor = document.getElementById('detalle-contenedor');
            
            const botonesTalla = productoActual.tallas.map(t => 
                `<button class="btn-opcion ${tallaSeleccionada === t ? 'activa' : ''}" onclick="seleccionarTalla('${t}')">${t}</button>`
            ).join('');

            const botonesColor = productoActual.colores.map(c => 
                `<button class="btn-opcion ${colorSeleccionado === c ? 'activa' : ''}" onclick="seleccionarColor('${c}')">${c}</button>`
            ).join('');

            contenedor.innerHTML = `
                <div class="foto-producto">
                    <img src="${productoActual.imagen}" alt="${productoActual.nombre}">
                </div>
                <div class="detalles-producto">
                    <span class="categoria-etiqueta">${productoActual.categoria}</span>
                    <h1>${productoActual.nombre}</h1>
                    <div class="estrellas">⭐ ${productoActual.estrellas} <span style="font-weight:normal; color:var(--texto-secundario)">(${productoActual.reviews} opiniones)</span></div>
                    <p class="precio-grande">S/ ${productoActual.precio.toFixed(2)}</p>
                    <p class="descripcion">${productoActual.descripcion}</p>

                    <div class="selector">
                        <h4>Color: <span style="font-weight:normal; color:var(--texto-secundario)">${colorSeleccionado}</span></h4>
                        <div class="opciones">${botonesColor}</div>
                    </div>

                    <div class="selector">
                        <h4>Talla: <span style="font-weight:normal; color:var(--texto-secundario)">${tallaSeleccionada}</span></h4>
                        <div class="opciones">${botonesTalla}</div>
                    </div>

                    <div class="acciones">
                        <button class="btn-favorito" onclick="mostrarToast('Agregado a favoritos ❤️')">❤️</button>
                        <button class="btn-comprar" onclick="agregarAlCarritoActual()">Agregar al Carrito 🛒</button>
                    </div>
                </div>
            `;
        }

        function seleccionarTalla(talla) { tallaSeleccionada = talla; renderizarVista(); }
        function seleccionarColor(color) { colorSeleccionado = color; renderizarVista(); }
        function agregarAlCarritoActual() { agregarAlCarrito(productoActual.id, tallaSeleccionada, colorSeleccionado); }
    </script>
</body>
</html>
